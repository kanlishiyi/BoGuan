name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install ruff

      - name: Ruff 检查
        run: |
          ruff check boguan/ --output-format=github

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: 运行测试
        run: |
          pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: test-key
          MCP_SERVER_URL: http://localhost:9999/mcp

  docker:
    name: Docker 构建
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          docker build -t boguan-agent:latest .
