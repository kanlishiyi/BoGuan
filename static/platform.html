<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博观 Agent 管理平台</title>
<style>
/* ============================================================
   CSS 变量
   ============================================================ */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a40;
  --bg-input: #0d1320;
  --border: #1e2d45;
  --border-active: #3b82f6;
  --text-1: #e2e8f0;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary); color: var(--text-1);
  height: 100vh; overflow: hidden;
}

/* ============================================================
   布局
   ============================================================ */
.app { display:flex; flex-direction:column; height:100vh; }

/* 顶栏 */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; background:var(--bg-secondary);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.header-left { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; position:relative; }
.logo-icon svg { width:100%; height:100%; filter:drop-shadow(0 0 5px rgba(6,182,212,0.4)); }
.logo-sweep { transform-origin:center; animation:sweep 3s linear infinite; }
@keyframes sweep { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.header h1 {
  font-size:17px; font-weight:600;
  background:linear-gradient(135deg,var(--text-1),var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header-badge {
  font-size:10px; padding:2px 7px; border-radius:20px;
  background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.25);
  color:var(--blue);
}

/* 主体 */
.body { display:flex; flex:1; overflow:hidden; }

/* ============================================================
   侧边栏
   ============================================================ */
.sidebar {
  width:270px; min-width:270px; display:flex; flex-direction:column;
  background:var(--bg-secondary); border-right:1px solid var(--border);
}
.sidebar-title {
  padding:14px 16px; font-size:13px; font-weight:600; color:var(--text-2);
  border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px;
}
.sidebar-list { flex:1; overflow-y:auto; padding:10px; }
.sidebar-list::-webkit-scrollbar { width:4px; }
.sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Agent 卡片 */
.agent-card {
  padding:12px 14px; border-radius:var(--radius-sm);
  border:1px solid transparent; cursor:pointer;
  transition:all .2s; margin-bottom:6px;
}
.agent-card:hover { background:var(--bg-card); border-color:var(--border); }
.agent-card.active { background:var(--bg-card); border-color:var(--blue); box-shadow:0 0 12px rgba(59,130,246,0.15); }
.agent-card .ac-top { display:flex; align-items:center; gap:10px; }
.agent-card .ac-avatar { font-size:24px; width:36px; text-align:center; }
.agent-card .ac-info { flex:1; min-width:0; }
.agent-card .ac-name { font-size:14px; font-weight:600; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.agent-card .ac-desc { font-size:11px; color:var(--text-3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.agent-card .ac-tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.agent-card .ac-tag {
  font-size:10px; padding:1px 6px; border-radius:3px;
  background:rgba(6,182,212,0.1); color:var(--cyan);
}
/* Agent 正在对话的脉冲指示器 */
.ac-streaming {
  display:inline-block; width:7px; height:7px; border-radius:50%;
  background:var(--green); margin-left:6px; vertical-align:middle;
  animation:pulse-stream 1.5s ease-in-out infinite;
}
@keyframes pulse-stream {
  0%,100% { box-shadow:0 0 0 0 rgba(16,185,129,0.5); }
  50% { box-shadow:0 0 6px 3px rgba(16,185,129,0.3); }
}

.btn-new-agent {
  margin:10px; padding:10px; border:1px dashed var(--border); border-radius:var(--radius-sm);
  background:transparent; color:var(--text-2); font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .2s;
}
.btn-new-agent:hover { border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,0.05); }

/* ============================================================
   主面板
   ============================================================ */
.main {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
}

/* 面板头（Agent 名称 + Tab） */
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--bg-secondary);
}
.panel-agent-name { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
.panel-tabs { display:flex; gap:4px; }
.tab-btn {
  padding:6px 16px; border:1px solid var(--border); border-radius:20px;
  background:transparent; color:var(--text-2); font-size:12px; cursor:pointer;
  transition:all .2s; font-weight:500;
}
.tab-btn:hover { border-color:var(--text-3); color:var(--text-1); }
.tab-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

/* 面板内容区 */
.panel-body { flex:1; overflow-y:auto; padding:20px 24px; }
.panel-body::-webkit-scrollbar { width:5px; }
.panel-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* 空状态 */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; color:var(--text-3); gap:12px; text-align:center;
}
.empty-state .icon { font-size:56px; opacity:.3; }
.empty-state p { font-size:14px; max-width:300px; }

/* ============================================================
   配置表单
   ============================================================ */
.form-section { margin-bottom:24px; }
.form-section-title {
  font-size:13px; font-weight:600; color:var(--cyan); margin-bottom:10px;
  display:flex; align-items:center; gap:6px;
}
.form-row { margin-bottom:14px; }
.form-label { font-size:12px; color:var(--text-2); margin-bottom:4px; display:block; }
.form-input, .form-textarea, .form-select {
  width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
  background:var(--bg-input); color:var(--text-1); font-size:13px;
  font-family:inherit; outline:none; transition:border-color .2s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--blue); }
.form-textarea { min-height:120px; resize:vertical; line-height:1.6; font-family:'SF Mono','Consolas',monospace; font-size:12px; }
.form-textarea.tall { min-height:200px; }

/* 头像选择 */
.avatar-picker { display:flex; gap:6px; flex-wrap:wrap; }
.avatar-opt {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  font-size:20px; border-radius:8px; border:2px solid var(--border);
  cursor:pointer; transition:all .2s; background:var(--bg-input);
}
.avatar-opt:hover { border-color:var(--text-3); }
.avatar-opt.active { border-color:var(--blue); background:rgba(59,130,246,0.1); box-shadow:0 0 8px rgba(59,130,246,0.2); }

/* Skills 复选框 */
.skill-checks { display:flex; flex-direction:column; gap:8px; }
.skill-check {
  display:flex; align-items:flex-start; gap:10px; padding:10px 12px;
  background:var(--bg-input); border-radius:var(--radius-sm); border:1px solid var(--border);
  cursor:pointer; transition:border-color .2s;
}
.skill-check:hover { border-color:var(--text-3); }
.skill-check input { margin-top:2px; accent-color:var(--blue); }
.skill-check .sk-name { font-size:13px; font-weight:600; color:var(--text-1); }
.skill-check .sk-desc { font-size:11px; color:var(--text-3); margin-top:2px; }

/* MCP 服务器列表 */
.mcp-item {
  display:flex; gap:8px; align-items:center; margin-bottom:8px;
  padding:10px 12px; background:var(--bg-input); border:1px solid var(--border);
  border-radius:var(--radius-sm); flex-wrap:wrap;
}
.mcp-item input { flex:1; min-width:80px; padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-card); color:var(--text-1); font-size:12px; outline:none; }
.mcp-item input:focus { border-color:var(--blue); }
.mcp-item select { padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-card); color:var(--text-1); font-size:12px; }
.mcp-item .mcp-btns { display:flex; gap:4px; }

/* 小按钮 */
.btn-sm {
  padding:5px 10px; border:1px solid var(--border); border-radius:6px;
  background:transparent; color:var(--text-2); font-size:11px; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.btn-sm:hover { border-color:var(--blue); color:var(--blue); }
.btn-sm.danger:hover { border-color:var(--red); color:var(--red); }
.btn-sm.success { border-color:var(--green); color:var(--green); }

/* 主按钮 */
.form-actions { display:flex; gap:10px; margin-top:24px; }
.btn-primary {
  padding:10px 28px; border:none; border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#fff;
  font-size:13px; font-weight:600; cursor:pointer; transition:all .2s;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 0 15px rgba(59,130,246,0.3); }
.btn-danger {
  padding:10px 20px; border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius-sm);
  background:transparent; color:var(--red); font-size:13px; cursor:pointer;
  transition:all .2s;
}
.btn-danger:hover { background:rgba(239,68,68,0.1); }

/* ============================================================
   对话界面
   ============================================================ */
.chat-wrap { display:flex; flex-direction:column; height:100%; }
.chat-messages { flex:1; overflow-y:auto; padding:16px 20px; }
.chat-messages::-webkit-scrollbar { width:5px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* 消息 */
.msg { margin-bottom:16px; display:flex; gap:10px; animation:fadeUp .3s ease-out; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-user { flex-direction:row-reverse; }
.msg-user .msg-bubble {
  background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#fff;
  padding:10px 14px; border-radius:var(--radius) 4px var(--radius) var(--radius);
  max-width:70%; font-size:14px; line-height:1.6;
}
.msg-avatar { font-size:22px; width:32px; text-align:center; flex-shrink:0; padding-top:4px; }
.msg-body { max-width:80%; min-width:0; }

/* AI 文本块 */
.ai-text {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; font-size:13px; line-height:1.8; color:var(--text-1);
  white-space:pre-wrap; word-break:break-word;
}
.ai-text .cursor { display:inline-block; width:2px; height:14px; background:var(--cyan); animation:blink 1s step-end infinite; vertical-align:text-bottom; margin-left:2px; }
@keyframes blink { 50%{opacity:0} }

/* 思考块 */
.think-block {
  background:rgba(139,92,246,0.08); border:1px solid rgba(139,92,246,0.2);
  border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:8px;
  font-size:12px; color:var(--text-2); line-height:1.7; white-space:pre-wrap;
}
.think-label { font-size:11px; font-weight:600; color:var(--purple); margin-bottom:4px; }

/* 工具卡片 */
.tool-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 14px; margin-bottom:8px; font-size:12px;
}
.tool-card-header { display:flex; align-items:center; gap:6px; cursor:pointer; }
.tool-card-tag {
  font-size:10px; font-weight:600; padding:2px 6px; border-radius:3px;
}
.tool-card-tag.call { background:rgba(59,130,246,0.15); color:var(--blue); }
.tool-card-tag.result { background:rgba(16,185,129,0.15); color:var(--green); }
.tool-card-name { font-size:12px; color:var(--text-1); font-weight:500; }
.tool-card-body {
  display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border);
}
.tool-card-body.open { display:block; }
.tool-card-body pre {
  font-family:'SF Mono','Consolas',monospace; font-size:11px; line-height:1.5;
  color:var(--text-2); white-space:pre-wrap; word-break:break-all;
  max-height:200px; overflow-y:auto; background:var(--bg-input);
  padding:8px; border-radius:6px;
}

/* 状态消息 */
.msg-status {
  text-align:center; font-size:12px; color:var(--text-3); padding:6px 0;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.msg-status .dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:blink 1s infinite; }

/* 多轮对话 — 轮次分隔线 */
.turn-separator {
  display:flex; align-items:center; gap:12px; padding:14px 0 10px;
  animation:fadeUp .3s ease-out;
}
.turn-separator::before, .turn-separator::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(90deg, transparent, var(--border), transparent);
}
.turn-separator .turn-label {
  font-size:11px; color:var(--text-3); white-space:nowrap;
  display:flex; align-items:center; gap:5px;
  padding:3px 12px; border-radius:20px;
  background:rgba(59,130,246,0.06); border:1px solid rgba(59,130,246,0.12);
}
.turn-separator .turn-label .turn-icon { font-size:12px; }

/* 多轮指示器（输入栏上方） */
.multiturn-hint {
  display:flex; align-items:center; gap:6px; padding:6px 20px;
  font-size:11px; color:var(--cyan);
  background:rgba(6,182,212,0.04); border-top:1px solid rgba(6,182,212,0.1);
}
.multiturn-hint .mt-dot {
  width:5px; height:5px; border-radius:50%; background:var(--cyan);
  animation:pulse-stream 2s ease-in-out infinite;
}

/* 初始化状态容器（单行实时更新，工作开始后直接移除） */
.init-status-bar {
  text-align:center; font-size:12px; color:var(--text-3); padding:8px 12px;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:opacity .3s ease;
}
.init-status-bar .dot {
  width:6px; height:6px; border-radius:50%; background:var(--cyan);
  animation:blink 1s infinite; flex-shrink:0;
}
.init-status-bar.removing {
  opacity:0; pointer-events:none;
}

/* 输入栏 */
.chat-input-bar {
  padding:12px 20px; border-top:1px solid var(--border); background:var(--bg-secondary);
  display:flex; gap:10px; align-items:center; flex-shrink:0;
}
.chat-input {
  flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius);
  background:var(--bg-input); color:var(--text-1); font-size:14px;
  outline:none; font-family:inherit; transition:border-color .2s;
}
.chat-input:focus { border-color:var(--blue); }
.chat-send {
  padding:10px 20px; border:none; border-radius:var(--radius);
  background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#fff;
  font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.chat-send:hover { box-shadow:0 0 12px rgba(59,130,246,0.3); }
.chat-send:disabled { opacity:.4; cursor:not-allowed; }
.chat-new {
  padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius);
  background:transparent; color:var(--text-2); font-size:12px; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.chat-new:hover { border-color:var(--blue); color:var(--blue); }

/* ============================================================
   状态栏
   ============================================================ */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 20px; background:var(--bg-secondary);
  border-top:1px solid var(--border); font-size:11px; color:var(--text-3);
}
.status-dot { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; }

/* 用户信息 & 退出 */
.header-right { display:flex; align-items:center; gap:12px; }
.user-info { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-2); }
.user-info .user-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--cyan)); display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff; font-weight:600; }
.btn-logout {
  padding:5px 12px; border:1px solid var(--border); border-radius:20px;
  background:transparent; color:var(--text-3); font-size:11px; cursor:pointer;
  transition:all .2s;
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gBG" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6"/><stop offset="50%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
            <linearGradient id="gSw" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/><stop offset="100%" stop-color="#06b6d4" stop-opacity=".7"/>
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="17" fill="none" stroke="url(#gBG)" stroke-width="1.8" opacity=".8"/>
          <circle cx="20" cy="20" r="12" fill="none" stroke="url(#gBG)" stroke-width="1" opacity=".35"/>
          <circle cx="20" cy="20" r="7" fill="none" stroke="url(#gBG)" stroke-width=".8" opacity=".25"/>
          <line x1="20" y1="3" x2="20" y2="37" stroke="url(#gBG)" stroke-width=".5" opacity=".2"/>
          <line x1="3" y1="20" x2="37" y2="20" stroke="url(#gBG)" stroke-width=".5" opacity=".2"/>
          <path class="logo-sweep" d="M20,20 L20,3 A17,17 0 0,1 34.5,11.5 Z" fill="url(#gSw)" opacity=".5"/>
          <circle cx="20" cy="20" r="3.5" fill="url(#gBG)" opacity=".9"/>
          <circle cx="20" cy="20" r="1.5" fill="#fff" opacity=".9"/>
        </svg>
      </div>
      <h1>博观 Agent 管理平台</h1>
      <span class="header-badge">DeepAgents</span>
    </div>
    <div class="header-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar"></div>
        <span id="userDisplayName"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <!-- 主体 -->
  <div class="body">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <div class="sidebar-title">📋 我的 Agent <span id="agentCount" style="margin-left:auto;color:var(--text-3)"></span></div>
      <div class="sidebar-list" id="sidebarList"></div>
      <button class="btn-new-agent" onclick="createNewAgent()">＋ 新建 Agent</button>
    </div>

    <!-- 主面板 -->
    <div class="main" id="mainPanel">
      <!-- 空状态 -->
      <div class="empty-state" id="emptyMain">
        <div class="icon">🤖</div>
        <p>选择左侧的 Agent 进行配置或对话，或创建一个新的 Agent</p>
      </div>
      <!-- 有 Agent 选中时 -->
      <div id="agentPanel" style="display:none;flex-direction:column;height:100%;">
        <div class="panel-header">
          <div class="panel-agent-name"><span id="panelAvatar"></span><span id="panelName"></span></div>
          <div class="panel-tabs">
            <button class="tab-btn active" id="tabConfig" onclick="switchTab('config')">⚙ 配置</button>
            <button class="tab-btn" id="tabChat" onclick="switchTab('chat')">💬 对话</button>
          </div>
        </div>
        <!-- 配置视图 -->
        <div class="panel-body" id="viewConfig"></div>
        <!-- 对话视图 -->
        <div id="viewChat" style="display:none;flex:1;flex-direction:column;overflow:hidden;"></div>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <span><span class="status-dot"></span>就绪</span>
    <span>博观 Agent 管理平台 v1.0</span>
  </div>
</div>

<script>
// ============================================================
// 状态
// ============================================================
let agents = [];
let skills = [];
let selectedId = null;
let activeTab = 'config';
const AVATARS = ['🤖','🔍','🛡️','📊','🔧','💡','🧠','📡','🎯','⚡','🚀','🔬'];

// ---- Per-Agent 对话状态（支持多 Agent 同时对话） ----
let chatStates = {};  // agentId -> { es, aiEl, thinkEl, thinkBuf, threadId, streaming, msgLog }

function getCS(aid) {
  if (!chatStates[aid]) {
    chatStates[aid] = {
      es: null, aiEl: null, thinkEl: null, thinkBuf: '',
      threadId: '', streaming: false,
      msgLog: [],           // 结构化消息日志，用于持久化
      historyLoaded: false, // 是否已从服务端加载历史
      turn: 0,              // 当前轮次
    };
  }
  return chatStates[aid];
}

// ============================================================
// 认证 & API
// ============================================================
function getToken() { return localStorage.getItem('boguan_token') || ''; }

function authHeaders(extra) {
  return { 'Authorization': 'Bearer ' + getToken(), ...(extra || {}) };
}

async function api(path, opts) {
  opts = opts || {};
  opts.headers = authHeaders(opts.headers || {});
  const r = await fetch(path, opts);
  if (r.status === 401) {
    // token 过期，跳转登录
    localStorage.removeItem('boguan_token');
    localStorage.removeItem('boguan_user');
    window.location.href = '/login';
    throw new Error('未登录');
  }
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function doLogout() {
  try {
    await fetch('/api/auth/logout', { method: 'POST', headers: authHeaders() });
  } catch(e) {}
  localStorage.removeItem('boguan_token');
  localStorage.removeItem('boguan_user');
  window.location.href = '/login';
}

async function loadAgents() {
  agents = await api('/api/agents');
  renderSidebar();
}

async function loadSkills() {
  skills = await api('/api/skills');
}

// ============================================================
// 侧边栏渲染
// ============================================================
function renderSidebar() {
  const el = document.getElementById('sidebarList');
  document.getElementById('agentCount').textContent = agents.length ? agents.length + ' 个' : '';
  if (!agents.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:40px 0;font-size:13px;">暂无 Agent<br>点击下方按钮创建</div>';
    return;
  }
  el.innerHTML = agents.map(a => {
    const cs = chatStates[a.id];
    const isStreaming = cs && cs.streaming;
    return `
    <div class="agent-card ${a.id === selectedId ? 'active' : ''}" onclick="selectAgent('${a.id}')">
      <div class="ac-top">
        <div class="ac-avatar">${a.avatar || '🤖'}</div>
        <div class="ac-info">
          <div class="ac-name">${esc(a.name)}${isStreaming ? '<span class="ac-streaming" title="对话进行中"></span>' : ''}</div>
          <div class="ac-desc">${esc(a.description || '暂无描述')}</div>
        </div>
      </div>
      <div class="ac-tags">
        ${(a.skills||[]).length ? `<span class="ac-tag">${(a.skills||[]).length} Skills</span>` : ''}
        ${(a.mcp_servers||[]).length ? `<span class="ac-tag">${(a.mcp_servers||[]).length} MCP</span>` : ''}
        ${isStreaming ? '<span class="ac-tag" style="background:rgba(16,185,129,0.15);color:var(--green);">对话中</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// 选择 Agent
// ============================================================
function selectAgent(id) {
  selectedId = id;
  renderSidebar();
  const a = agents.find(x => x.id === id);
  if (!a) return;
  document.getElementById('emptyMain').style.display = 'none';
  const p = document.getElementById('agentPanel');
  p.style.display = 'flex';
  document.getElementById('panelAvatar').textContent = a.avatar || '🤖';
  document.getElementById('panelName').textContent = a.name;
  switchTab(activeTab);
}

// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabConfig').className = 'tab-btn' + (tab==='config'?' active':'');
  document.getElementById('tabChat').className = 'tab-btn' + (tab==='chat'?' active':'');
  document.getElementById('viewConfig').style.display = tab==='config'?'block':'none';
  document.getElementById('viewChat').style.display = tab==='chat'?'flex':'none';
  if (tab === 'config') renderConfigForm();
  if (tab === 'chat') renderChatView();
}

// ============================================================
// 配置操作
// ============================================================
function pickAvatar(el, emoji) {
  document.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('cfgAvatar').value = emoji;
}

function addMcp() {
  const a = agents.find(x => x.id === selectedId);
  if (!a) return;
  a.mcp_servers = a.mcp_servers || [];
  a.mcp_servers.push({name: 'server' + (a.mcp_servers.length+1), url: '', transport: 'streamable_http'});
  renderConfigForm();
}

function removeMcp(idx) {
  const a = agents.find(x => x.id === selectedId);
  if (!a) return;
  a.mcp_servers.splice(idx, 1);
  renderConfigForm();
}

async function probeMcp(idx) {
  const items = document.querySelectorAll('.mcp-item');
  const item = items[idx];
  if (!item) return;
  const name = item.querySelector('[data-field="name"]').value;
  const url = item.querySelector('[data-field="url"]').value;
  const transport = item.querySelector('[data-field="transport"]').value;
  const resEl = document.getElementById('mcpProbeResult' + idx);
  resEl.innerHTML = '<span style="color:var(--cyan)">连接中...</span>';
  try {
    const r = await api('/api/mcp/probe', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, url, transport}),
    });
    if (r.ok) {
      resEl.innerHTML = `<span style="color:var(--green)">✓ 连接成功，${r.count} 个工具</span>`;
    } else {
      resEl.innerHTML = `<span style="color:var(--red)">✗ ${esc(r.error)}</span>`;
    }
  } catch(e) {
    resEl.innerHTML = `<span style="color:var(--red)">✗ ${esc(e.message)}</span>`;
  }
}

function _gatherForm() {
  // 收集 MCP 服务器
  const mcpItems = document.querySelectorAll('.mcp-item');
  const mcps = [];
  mcpItems.forEach(item => {
    const name = item.querySelector('[data-field="name"]').value.trim();
    const url = item.querySelector('[data-field="url"]').value.trim();
    const transport = item.querySelector('[data-field="transport"]').value;
    if (name && url) mcps.push({name, url, transport});
  });
  // 收集 Skills
  const checkedSkills = [];
  document.querySelectorAll('.skill-check input:checked').forEach(cb => checkedSkills.push(cb.value));

  return {
    name: document.getElementById('cfgName').value.trim(),
    description: document.getElementById('cfgDesc').value.trim(),
    avatar: document.getElementById('cfgAvatar').value,
    system_prompt: document.getElementById('cfgPrompt').value,
    skills: checkedSkills,
    mcp_servers: mcps,
    llm_config: null,
  };
}

async function saveConfig(e) {
  e.preventDefault();
  const data = _gatherForm();
  if (!data.name) { alert('请输入 Agent 名称'); return; }
  const a = agents.find(x => x.id === selectedId);
  try {
    if (a._isNew) {
      const created = await api('/api/agents', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data),
      });
      // 移除临时对象，替换为服务端返回
      agents = agents.filter(x => x.id !== selectedId);
      agents.push(created);
      selectedId = created.id;
    } else {
      const updated = await api(`/api/agents/${selectedId}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data),
      });
      const idx = agents.findIndex(x => x.id === selectedId);
      if (idx >= 0) agents[idx] = updated;
    }
    renderSidebar();
    selectAgent(selectedId);
  } catch(e) {
    alert('保存失败: ' + e.message);
  }
}

async function deleteCurrentAgent() {
  if (!confirm('确定要删除这个 Agent 吗？')) return;
  const a = agents.find(x => x.id === selectedId);
  if (a && a._isNew) {
    agents = agents.filter(x => x.id !== selectedId);
    selectedId = null;
    renderSidebar();
    document.getElementById('agentPanel').style.display = 'none';
    document.getElementById('emptyMain').style.display = 'flex';
    return;
  }
  try {
    await api(`/api/agents/${selectedId}`, {method:'DELETE'});
    agents = agents.filter(x => x.id !== selectedId);
    selectedId = null;
    renderSidebar();
    document.getElementById('agentPanel').style.display = 'none';
    document.getElementById('emptyMain').style.display = 'flex';
  } catch(e) {
    alert('删除失败: ' + e.message);
  }
}

function createNewAgent() {
  const tmpId = '_new_' + Date.now();
  const newAgent = {
    id: tmpId, _isNew: true,
    name: '', description: '', avatar: '🤖',
    system_prompt: '', skills: [], mcp_servers: [], llm_config: null,
  };
  agents.push(newAgent);
  selectedId = tmpId;
  activeTab = 'config';
  renderSidebar();
  selectAgent(tmpId);
}

// ============================================================
// 对话视图（Per-Agent 独立容器，支持多 Agent 同时对话）
// ============================================================

/**
 * 确保 agent 有专属的 chat DOM 容器（创建一次，后续 show/hide）
 */
function ensureChatContainer(aid) {
  const wrap = document.getElementById('viewChat');
  let container = document.getElementById('chatWrap-' + aid);
  if (!container) {
    const a = agents.find(x => x.id === aid) || {};
    container = document.createElement('div');
    container.className = 'chat-wrap';
    container.id = 'chatWrap-' + aid;
    container.style.display = 'none';
    container.innerHTML = `
      <div class="chat-messages" id="chatMsg-${aid}"></div>
      <div class="multiturn-hint" id="mtHint-${aid}" style="display:none;">
        <span class="mt-dot"></span>
        <span id="mtHintText-${aid}">多轮对话模式 · 基于上下文继续</span>
      </div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chatInput-${aid}" placeholder="输入消息..."
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${aid}');}">
        <button class="chat-send" id="chatSend-${aid}" onclick="sendMsg('${aid}')">发送</button>
        <button class="chat-new" onclick="newConversation('${aid}')">新对话</button>
      </div>
    `;
    wrap.appendChild(container);
  }
  return container;
}

function renderChatView() {
  const aid = selectedId;
  const a = agents.find(x => x.id === aid);
  const wrap = document.getElementById('viewChat');

  if (!a || a._isNew) {
    // 隐藏所有容器，显示提示
    wrap.querySelectorAll('.chat-wrap').forEach(c => c.style.display = 'none');
    let hint = document.getElementById('chatEmptyHint');
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'chatEmptyHint';
      hint.className = 'empty-state';
      hint.innerHTML = '<div class="icon">💬</div><p>请先保存 Agent 配置后再开始对话</p>';
      wrap.appendChild(hint);
    }
    hint.style.display = 'flex';
    return;
  }

  // 隐藏提示和所有其他容器
  const hint = document.getElementById('chatEmptyHint');
  if (hint) hint.style.display = 'none';
  wrap.querySelectorAll('.chat-wrap').forEach(c => c.style.display = 'none');

  // 显示当前 agent 的容器
  const container = ensureChatContainer(aid);
  container.style.display = 'flex';

  // 如果当前 agent 正在 streaming，禁用输入
  const cs = getCS(aid);
  const sendBtn = document.getElementById('chatSend-' + aid);
  const inp = document.getElementById('chatInput-' + aid);
  if (cs.streaming) {
    if (sendBtn) sendBtn.disabled = true;
    if (inp) inp.disabled = true;
  } else {
    if (sendBtn) sendBtn.disabled = false;
    if (inp) { inp.disabled = false; inp.focus(); }
  }

  // 首次进入时从服务端加载历史对话
  if (!cs.historyLoaded) {
    cs.historyLoaded = true;
    loadChatHistory(aid);
  } else {
    scrollChat(aid);
  }
}

function scrollChat(aid) {
  const el = document.getElementById('chatMsg-' + (aid || selectedId));
  if (el) requestAnimationFrame(() => el.scrollTop = el.scrollHeight);
}

function newConversation(aid) {
  const cs = getCS(aid);
  if (cs.es) { cs.es.close(); cs.es = null; }
  cs.aiEl = null; cs.thinkEl = null; cs.thinkBuf = '';
  cs.threadId = ''; cs.streaming = false;
  cs.msgLog = [];
  cs.turn = 0;
  cs.historyLoaded = false;
  cs._initBar = null;
  cs._initSteps = [];
  // 清空 DOM
  const msgEl = document.getElementById('chatMsg-' + aid);
  if (msgEl) msgEl.innerHTML = '';
  // 隐藏多轮提示
  const hint = document.getElementById('mtHint-' + aid);
  if (hint) hint.style.display = 'none';
  // 恢复输入框默认占位符
  const inp = document.getElementById('chatInput-' + aid);
  if (inp) inp.placeholder = '输入消息...';
  enableAgentInput(aid);
  renderSidebar();
  // 清除服务端历史
  fetch(`/api/agents/${encodeURIComponent(aid)}/history`, { method: 'DELETE', headers: authHeaders() }).catch(() => {});
}

// ============================================================
// 对话历史持久化
// ============================================================

/** 从服务端加载历史并渲染到聊天区 */
async function loadChatHistory(aid) {
  try {
    const data = await api(`/api/agents/${encodeURIComponent(aid)}/history`);
    if (!data || !data.messages || data.messages.length === 0) {
      scrollChat(aid);
      return;
    }
    const cs = getCS(aid);
    cs.threadId = data.thread_id || '';
    cs.msgLog = data.messages;
    const turnCount = renderHistoryMessages(aid, data.messages);
    // 恢复多轮对话状态
    if (turnCount > 0) {
      cs.turn = turnCount;
      updateMultiturnHint(aid);
    }
    scrollChat(aid);
  } catch(e) {
    console.error('加载历史失败:', e);
    scrollChat(aid);
  }
}

/** 将历史保存到服务端 */
async function saveChatHistory(aid) {
  const cs = getCS(aid);
  if (!cs.msgLog || cs.msgLog.length === 0) return;
  try {
    await fetch(`/api/agents/${encodeURIComponent(aid)}/history`, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ thread_id: cs.threadId, messages: cs.msgLog }),
    });
  } catch(e) {
    console.error('保存历史失败:', e);
  }
}

/** 将结构化消息数组渲染为 DOM（支持多轮分隔线） */
function renderHistoryMessages(aid, messages) {
  const msgEl = document.getElementById('chatMsg-' + aid);
  if (!msgEl) return;
  const a = agents.find(x => x.id === aid);
  const avatar = a?.avatar || '🤖';

  // 检测轮次：每遇到 user 消息且前面有非 user 消息（排除开头），则插入分隔线
  let turnCount = 0;
  let lastWasUser = true; // 开头算 user 这样第一条 user 不会触发分隔

  messages.forEach((m, idx) => {
    if (m.t === 'user') {
      turnCount++;
      // 第2轮起插入分隔线
      if (turnCount > 1) {
        const sep = document.createElement('div');
        sep.className = 'turn-separator';
        sep.innerHTML = `<span class="turn-label"><span class="turn-icon">🔄</span> 第 ${turnCount} 轮对话</span>`;
        msgEl.appendChild(sep);
      }
    }

    switch(m.t) {
      case 'user':
        msgEl.appendChild(_mkEl(`<div class="msg msg-user"><div class="msg-bubble">${esc(m.text)}</div></div>`));
        break;
      case 'ai':
        msgEl.appendChild(_mkEl(`<div class="msg"><div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="ai-text">${esc(m.text)}</div></div></div>`));
        break;
      case 'think':
        msgEl.appendChild(_mkEl(`<div class="msg"><div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="think-block"><div class="think-label">💭 思考过程</div><div class="think-text">${esc(m.text)}</div></div></div></div>`));
        break;
      case 'tool_call':
        msgEl.appendChild(_mkEl(`<div class="msg"><div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="tool-card"><div class="tool-card-header" onclick="this.nextElementSibling.classList.toggle('open')"><span class="tool-card-tag call">调用</span><span class="tool-card-name">${esc(m.name)}</span></div><div class="tool-card-body"><pre>${esc(m.args||'')}</pre></div></div></div></div>`));
        break;
      case 'tool_end':
        msgEl.appendChild(_mkEl(`<div class="msg"><div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="tool-card"><div class="tool-card-header" onclick="this.nextElementSibling.classList.toggle('open')"><span class="tool-card-tag result">返回</span><span class="tool-card-name">${esc(m.name)}</span></div><div class="tool-card-body"><pre>${esc(m.result||'')}</pre></div></div></div></div>`));
        break;
    }
  });

  // 返回检测到的轮次数
  return turnCount;
}

/** 工具函数：从 HTML 字符串创建元素 */
function _mkEl(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstElementChild;
}

function appendToAgent(aid, html) {
  const msgEl = document.getElementById('chatMsg-' + aid);
  if (msgEl) {
    const d = document.createElement('div');
    d.innerHTML = html;
    msgEl.appendChild(d.firstElementChild);
    scrollChat(aid);
  }
}

/** 更新多轮对话提示栏 */
function updateMultiturnHint(aid) {
  const cs = getCS(aid);
  const hint = document.getElementById('mtHint-' + aid);
  const hintText = document.getElementById('mtHintText-' + aid);
  const input = document.getElementById('chatInput-' + aid);
  if (cs.threadId && cs.turn >= 1) {
    if (hint) hint.style.display = 'flex';
    if (hintText) hintText.textContent = `多轮对话模式 · 第 ${cs.turn} 轮已完成 · 可继续追问`;
    if (input) input.placeholder = '基于上下文继续追问...';
  } else {
    if (hint) hint.style.display = 'none';
    if (input) input.placeholder = '输入消息...';
  }
}

/** 插入轮次分隔线 */
function insertTurnSeparator(aid, turn) {
  if (turn <= 1) return;
  const msgEl = document.getElementById('chatMsg-' + aid);
  if (!msgEl) return;
  const sep = document.createElement('div');
  sep.className = 'turn-separator';
  sep.innerHTML = `<span class="turn-label"><span class="turn-icon">🔄</span> 第 ${turn} 轮对话</span>`;
  msgEl.appendChild(sep);
}

function sendMsg(aid) {
  const input = document.getElementById('chatInput-' + aid);
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const a = agents.find(x => x.id === aid);
  if (!a) return;

  const cs = getCS(aid);

  // 如果已有对话（多轮），先插入轮次分隔线
  const hasPrior = cs.threadId && cs.msgLog.length > 0;
  if (hasPrior) {
    const prevTurn = cs.turn || 0;
    insertTurnSeparator(aid, prevTurn + 1);
  }

  // 隐藏多轮提示（发送时暂时隐藏，完成后再显示更新版本）
  const hint = document.getElementById('mtHint-' + aid);
  if (hint) hint.style.display = 'none';

  // 用户消息
  appendToAgent(aid, `<div class="msg msg-user"><div class="msg-bubble">${esc(msg)}</div></div>`);

  // 禁用此 agent 的输入
  cs.msgLog.push({ t: 'user', text: msg });
  cs.streaming = true;
  const sendBtn = document.getElementById('chatSend-' + aid);
  if (sendBtn) sendBtn.disabled = true;
  input.disabled = true;
  renderSidebar();  // 更新侧边栏 streaming 指示器

  // 重置初始化状态（确保新消息的 status 事件能被正确收起）
  cs._initBar = null;
  cs._initSteps = [];

  // SSE 连接（每个 agent 独立）
  const tid = cs.threadId || '';
  const url = `/api/agents/${encodeURIComponent(aid)}/chat?message=${encodeURIComponent(msg)}&thread_id=${encodeURIComponent(tid)}&token=${encodeURIComponent(getToken())}`;
  const es = new EventSource(url);
  cs.es = es;
  cs.aiEl = null; cs.thinkEl = null; cs.thinkBuf = '';

  const evts = ['start','status','llm_start','thinking','token','tool_call','tool_end','error','done'];
  evts.forEach(et => {
    es.addEventListener(et, e => {
      try { handleChatEvent(aid, et, JSON.parse(e.data)); } catch(err) { console.error(err); }
    });
  });
  es.onerror = () => {
    if (cs.es === es) { cs.es.close(); cs.es = null; cs.streaming = false; }
    enableAgentInput(aid);
    renderSidebar();
  };
}

function enableAgentInput(aid) {
  const btn = document.getElementById('chatSend-' + aid);
  const inp = document.getElementById('chatInput-' + aid);
  if (btn) btn.disabled = false;
  if (inp) { inp.disabled = false; if (aid === selectedId && activeTab === 'chat') inp.focus(); }
}

/**
 * 更新初始化状态（单行实时替换文本，只显示最新一条）
 */
function updateInitStatus(aid, text) {
  const msgEl = document.getElementById('chatMsg-' + aid);
  if (!msgEl) return;
  const cs = getCS(aid);

  let bar = cs._initBar;
  if (!bar || !bar.parentNode) {
    // 首次创建
    bar = document.createElement('div');
    bar.className = 'init-status-bar';
    bar.innerHTML = `<span class="dot"></span><span class="init-text"></span>`;
    msgEl.appendChild(bar);
    cs._initBar = bar;
  }
  // 更新文本（只显示最新的一条，不累加）
  const textEl = bar.querySelector('.init-text');
  if (textEl) textEl.textContent = text;
  scrollChat(aid);
}

/**
 * Agent 开始实际工作后，直接移除初始化状态栏（淡出 + 删除）
 */
function removeInitStatus(aid) {
  const cs = getCS(aid);
  const bar = cs._initBar;
  if (!bar) return;
  cs._initBar = null;
  bar.classList.add('removing');
  setTimeout(() => { if (bar.parentNode) bar.parentNode.removeChild(bar); }, 350);
}

function handleChatEvent(aid, type, data) {
  const msgEl = document.getElementById('chatMsg-' + aid);
  if (!msgEl) return;
  const cs = getCS(aid);
  const a = agents.find(x => x.id === aid);
  const avatar = a?.avatar || '🤖';

  // 当 Agent 开始产出内容时，直接移除初始化状态栏
  if (['thinking', 'token', 'tool_call', 'llm_start'].includes(type)) {
    removeInitStatus(aid);
  }

  switch(type) {
    case 'start':
      cs.threadId = data.thread_id;
      cs.turn = data.turn || 1;
      break;

    case 'status':
      updateInitStatus(aid, data.text);
      break;

    case 'thinking':
      if (!cs.thinkEl) {
        cs.thinkBuf = '';
        const block = document.createElement('div');
        block.className = 'msg';
        block.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="think-block"><div class="think-label">💭 思考过程</div><div class="think-text"></div></div></div>`;
        msgEl.appendChild(block);
        cs.thinkEl = block.querySelector('.think-text');
      }
      cs.thinkBuf += data.text;
      cs.thinkEl.textContent = cs.thinkBuf.replace(/\n{3,}/g,'\n\n').replace(/\n+$/,'');
      scrollChat(aid);
      break;

    case 'token':
      // 思考结束 → 保存思考内容到历史
      if (cs.thinkEl && cs.thinkBuf) {
        cs.msgLog.push({ t: 'think', text: cs.thinkBuf.replace(/\n{3,}/g,'\n\n').trim() });
      }
      cs.thinkEl = null;
      if (!cs.aiEl) {
        const block = document.createElement('div');
        block.className = 'msg';
        block.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="ai-text"><span class="cursor"></span></div></div>`;
        msgEl.appendChild(block);
        cs.aiEl = block.querySelector('.ai-text');
        cs.aiEl._buf = '';
      }
      cs.aiEl._buf += data.text;
      const cur = cs.aiEl.querySelector('.cursor');
      if (cur) cur.remove();
      cs.aiEl.textContent = cs.aiEl._buf.replace(/\n{3,}/g,'\n\n').replace(/\n+$/,'');
      const c2 = document.createElement('span');
      c2.className = 'cursor';
      cs.aiEl.appendChild(c2);
      scrollChat(aid);
      break;

    case 'tool_call': {
      // 如果有未保存的思考内容
      if (cs.thinkEl && cs.thinkBuf) {
        cs.msgLog.push({ t: 'think', text: cs.thinkBuf.replace(/\n{3,}/g,'\n\n').trim() });
      }
      cs.thinkEl = null;
      // 如果有未保存的 AI 文本
      if (cs.aiEl && cs.aiEl._buf) {
        cs.msgLog.push({ t: 'ai', text: cs.aiEl._buf.replace(/\n{3,}/g,'\n\n').trim() });
        const cc = cs.aiEl.querySelector('.cursor'); if(cc) cc.remove();
        cs.aiEl = null;
      }
      cs.msgLog.push({ t: 'tool_call', name: data.name, args: data.args || '' });
      const card = document.createElement('div');
      card.className = 'msg';
      card.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body">
        <div class="tool-card"><div class="tool-card-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="tool-card-tag call">调用</span><span class="tool-card-name">${esc(data.name)}</span>
        </div><div class="tool-card-body"><pre>${esc(data.args)}</pre></div></div></div>`;
      msgEl.appendChild(card);
      scrollChat(aid);
      break;
    }

    case 'tool_end': {
      const result = data.result || '';
      cs.msgLog.push({ t: 'tool_end', name: data.name, result: result });
      const card = document.createElement('div');
      card.className = 'msg';
      card.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body">
        <div class="tool-card"><div class="tool-card-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="tool-card-tag result">返回</span><span class="tool-card-name">${esc(data.name)}</span>
        </div><div class="tool-card-body"><pre>${esc(result)}</pre></div></div></div>`;
      msgEl.appendChild(card);
      scrollChat(aid);
      break;
    }

    case 'error': {
      const div = document.createElement('div');
      div.className = 'msg-status';
      div.innerHTML = `<span style="color:var(--red)">❌ ${esc(data.message)}</span>`;
      msgEl.appendChild(div);
      scrollChat(aid);
      break;
    }

    case 'done':
      // 保存最后的 AI 回复文本
      if (cs.aiEl && cs.aiEl._buf) {
        cs.msgLog.push({ t: 'ai', text: cs.aiEl._buf.replace(/\n{3,}/g,'\n\n').trim() });
        const cc = cs.aiEl.querySelector('.cursor'); if(cc) cc.remove();
        cs.aiEl = null;
      }
      // 保存最后的思考内容
      if (cs.thinkEl && cs.thinkBuf) {
        cs.msgLog.push({ t: 'think', text: cs.thinkBuf.replace(/\n{3,}/g,'\n\n').trim() });
      }
      cs.thinkEl = null;
      if (cs.es) { cs.es.close(); cs.es = null; }
      cs.streaming = false;
      enableAgentInput(aid);
      renderSidebar();
      // 显示多轮对话提示
      updateMultiturnHint(aid);
      // 持久化对话历史到服务端
      saveChatHistory(aid);
      break;
  }
}

// ============================================================
// 工具
// ============================================================
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// ============================================================
// 初始化
// ============================================================
async function init() {
  // 检查登录状态
  const token = getToken();
  if (!token) { window.location.href = '/login'; return; }
  try {
    const me = await api('/api/auth/me');
    // 显示用户信息
    const user = me.user;
    const avatarEl = document.getElementById('userAvatar');
    const nameEl = document.getElementById('userDisplayName');
    if (avatarEl) avatarEl.textContent = (user.display_name || user.username || 'U')[0].toUpperCase();
    if (nameEl) nameEl.textContent = user.display_name || user.username;
  } catch(e) {
    // token 无效，跳转登录
    window.location.href = '/login';
    return;
  }

  await Promise.all([loadAgents(), loadSkills()]);
  if (agents.length && !selectedId) {
    activeTab = 'chat';          // 默认进入对话界面
    selectAgent(agents[0].id);
  }
}
init();
</script>
