<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 博观 Agent 管理平台</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-input: #0d1320;
  --border: #1e2d45;
  --border-active: #3b82f6;
  --text-1: #e2e8f0;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --green: #10b981;
  --red: #ef4444;
  --purple: #8b5cf6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-1);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景动效 */
.bg-grid {
  position: absolute; inset: 0; overflow: hidden; z-index: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.bg-glow {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 0;
}
.bg-glow.g1 { width:400px; height:400px; background:var(--blue); top:-100px; left:-100px; animation:float1 8s ease-in-out infinite; }
.bg-glow.g2 { width:350px; height:350px; background:var(--cyan); bottom:-80px; right:-80px; animation:float2 10s ease-in-out infinite; }
.bg-glow.g3 { width:250px; height:250px; background:var(--purple); top:50%; left:60%; animation:float3 12s ease-in-out infinite; }
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
@keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }

/* 粒子 */
.particles { position:absolute; inset:0; z-index:0; }
.particle {
  position:absolute; width:2px; height:2px; background:var(--cyan);
  border-radius:50%; opacity:0; animation:particle-rise linear infinite;
}
@keyframes particle-rise {
  0% { opacity:0; transform:translateY(0) scale(1); }
  10% { opacity:0.6; }
  90% { opacity:0.2; }
  100% { opacity:0; transform:translateY(-100vh) scale(0.3); }
}

/* 登录卡片 */
.login-card {
  position: relative; z-index: 1;
  width: 420px; max-width: 90vw;
  background: rgba(26,34,53,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: 20px;
  padding: 48px 40px 40px;
  box-shadow:
    0 0 40px rgba(6,182,212,0.08),
    0 25px 60px rgba(0,0,0,0.4);
  animation: card-in 0.6s ease-out;
}
@keyframes card-in {
  from { opacity:0; transform:translateY(30px) scale(0.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* Logo */
.login-logo {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 32px;
}
.login-logo .logo-svg { width:56px; height:56px; margin-bottom:14px; }
.login-logo .logo-svg svg { width:100%; height:100%; filter:drop-shadow(0 0 10px rgba(6,182,212,0.4)); }
.logo-sweep-l { transform-origin:center; animation:sweep 3s linear infinite; }
@keyframes sweep { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.login-logo h2 {
  font-size: 22px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--text-1), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-logo .sub {
  font-size: 12px; color: var(--text-3); margin-top: 6px; letter-spacing: 0.5px;
}

/* 表单 */
.form-group {
  margin-bottom: 20px; position: relative;
}
.form-group label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.5px;
}
.input-wrap {
  position: relative; display: flex; align-items: center;
}
.input-wrap .icon {
  position: absolute; left: 14px; font-size: 16px;
  color: var(--text-3); pointer-events: none; transition: color 0.2s;
}
.input-wrap input {
  width: 100%; padding: 12px 14px 12px 42px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-1);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.input-wrap input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.input-wrap input:focus + .icon,
.input-wrap input:focus ~ .icon { color: var(--blue); }
.input-wrap input::placeholder { color: var(--text-3); }

/* 登录按钮 */
.btn-login {
  width: 100%;
  padding: 13px;
  margin-top: 8px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
.btn-login:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 25px rgba(59,130,246,0.35);
}
.btn-login:active { transform: translateY(0); }
.btn-login:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
  box-shadow: none;
}
.btn-login .shine {
  position: absolute; top:0; left:-100%; width:100%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shine 3s ease-in-out infinite;
}
@keyframes shine {
  0%,100% { left:-100%; }
  50% { left:100%; }
}

/* 错误提示 */
.error-msg {
  text-align: center; font-size: 13px; color: var(--red);
  min-height: 20px; margin-top: 14px;
  animation: shake 0.4s ease-out;
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-6px); }
  75% { transform:translateX(6px); }
}

/* 底部信息 */
.login-footer {
  text-align: center; margin-top: 24px; padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 11px; color: var(--text-3);
}
</style>
</head>
<body>

<!-- 背景效果 -->
<div class="bg-grid"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>
<div class="particles" id="particles"></div>

<!-- 登录卡片 -->
<div class="login-card">
  <div class="login-logo">
    <div class="logo-svg">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gBG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/><stop offset="50%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
          <linearGradient id="gSw" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/><stop offset="100%" stop-color="#06b6d4" stop-opacity=".7"/>
          </linearGradient>
        </defs>
        <circle cx="20" cy="20" r="17" fill="none" stroke="url(#gBG)" stroke-width="1.8" opacity=".8"/>
        <circle cx="20" cy="20" r="12" fill="none" stroke="url(#gBG)" stroke-width="1" opacity=".35"/>
        <circle cx="20" cy="20" r="7" fill="none" stroke="url(#gBG)" stroke-width=".8" opacity=".25"/>
        <line x1="20" y1="3" x2="20" y2="37" stroke="url(#gBG)" stroke-width=".5" opacity=".2"/>
        <line x1="3" y1="20" x2="37" y2="20" stroke="url(#gBG)" stroke-width=".5" opacity=".2"/>
        <path class="logo-sweep-l" d="M20,20 L20,3 A17,17 0 0,1 34.5,11.5 Z" fill="url(#gSw)" opacity=".5"/>
        <circle cx="20" cy="20" r="3.5" fill="url(#gBG)" opacity=".9"/>
        <circle cx="20" cy="20" r="1.5" fill="#fff" opacity=".9"/>
      </svg>
    </div>
    <h2>博观 Agent 管理平台</h2>
    <div class="sub">DeepAgents · 智能运维分析</div>
  </div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required autofocus>
        <span class="icon">👤</span>
      </div>
    </div>

    <div class="form-group">
      <label>密码</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        <span class="icon">🔒</span>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btnLogin">
      <span class="shine"></span>
      登 录
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="login-footer">
    博观 Agent 管理平台 v1.0 &nbsp;·&nbsp; Powered by DeepAgents
  </div>
</div>

<script>
// 生成粒子背景
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
})();

// 检查是否已登录
(function() {
  const token = localStorage.getItem('boguan_token');
  if (token) {
    // 验证 token 是否有效
    fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => {
      if (r.ok) window.location.href = '/';
    }).catch(() => {});
  }
})();

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const errEl = document.getElementById('errorMsg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    errEl.textContent = '请输入用户名和密码';
    return;
  }

  btn.disabled = true;
  btn.textContent = '登录中...';
  errEl.textContent = '';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    if (r.ok) {
      const data = await r.json();
      localStorage.setItem('boguan_token', data.token);
      localStorage.setItem('boguan_user', JSON.stringify(data.user));
      window.location.href = '/';
    } else {
      const err = await r.json().catch(() => ({}));
      errEl.textContent = err.detail || '登录失败，请检查用户名和密码';
    }
  } catch(err) {
    errEl.textContent = '网络错误，请稍后重试';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="shine"></span>登 录';
  }
}
</script>
</body>
</html>
